<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Controle de Combinados 1:1 — Óticas Diniz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#D62B2B;--red-soft:#FFF0F0;--red-mid:#FDDCDC;
  --bg:#F2F2F7;--surface:#FFFFFF;--surface2:#F8F8FA;
  --text1:#1C1C1E;--text2:#636366;--text3:#AEAEB2;
  --border:#E5E5EA;
  --green:#34C759;--green-soft:#F0FBF3;
  --amber:#FF9500;--amber-soft:#FFF7EC;
  --blue:#007AFF;--blue-soft:#F0F6FF;
  --r-md:14px;--r-lg:18px;--r-xl:22px;
  --font:'Inter',sans-serif;
}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text1);font-size:13px}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{background:var(--surface);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--red)}
.brand-name{font-size:14px;font-weight:600;letter-spacing:-0.01em}
.brand-tag{font-size:11px;color:var(--text3);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:12px}
.sync{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.sdot.spin{background:var(--amber);animation:pulse 1s infinite}
.sdot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.btn-new{background:var(--red);color:#fff;border:none;border-radius:20px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-new:hover{opacity:.88}
.metrics{background:var(--surface);padding:14px 20px 12px;display:flex;gap:10px;flex-shrink:0;border-bottom:1px solid var(--border)}
.metric{flex:1;background:var(--surface2);border-radius:var(--r-lg);padding:12px 14px;display:flex;flex-direction:column;gap:6px;border:1px solid var(--border)}
.micon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px}
.metric.total .micon{background:#F0F0F5}
.metric.atrasado .micon{background:var(--red-soft)}
.metric.hoje .micon{background:var(--amber-soft)}
.metric.pendente .micon{background:var(--blue-soft)}
.metric.concluido .micon{background:var(--green-soft)}
.mnum{font-size:22px;font-weight:600;line-height:1;letter-spacing:-0.02em}
.metric.total .mnum{color:var(--text1)}
.metric.atrasado .mnum{color:var(--red)}
.metric.hoje .mnum{color:var(--amber)}
.metric.pendente .mnum{color:var(--blue)}
.metric.concluido .mnum{color:var(--green)}
.mlabel{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.filters{background:var(--surface);padding:8px 20px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0}
.ftag{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-right:2px}
.fsel{border:1px solid var(--border);border-radius:20px;padding:5px 28px 5px 12px;font-family:var(--font);font-size:12px;color:var(--text1);background:var(--surface2);outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23AEAEB2' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center}
.fsel:focus{border-color:var(--red)}
.btn-clr{border:1px solid var(--border);background:transparent;border-radius:20px;padding:5px 12px;font-size:11px;color:var(--text3);cursor:pointer;font-family:var(--font);transition:all .15s}
.btn-clr:hover{border-color:var(--red);color:var(--red)}
.table-area{flex:1;overflow-y:auto;padding:16px 20px}
.tcard{background:var(--surface);border-radius:var(--r-xl);border:1px solid var(--border);overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead{background:var(--surface2)}
th{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:12px;overflow:hidden;text-overflow:ellipsis}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
tr.r-late td{background:#FFF8F8}
tr.r-today td{background:#FFFDF5}
tr.r-done td{opacity:.5}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.p-late{background:var(--red-soft);color:var(--red)}
.p-today{background:var(--amber-soft);color:#C07000}
.p-pend{background:var(--blue-soft);color:#005CC8}
.p-done{background:var(--green-soft);color:#1A8A3C}
.ltag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:500;background:var(--surface2);color:var(--text2);border:1px solid var(--border);white-space:nowrap}
.ltag.admin{background:#F0F4FF;color:#2E5BCC;border-color:#C8D8FF}
.dmono{font-size:11px;color:var(--text2)}
.dlate{color:var(--red);font-weight:600}
.dtoday{color:var(--amber);font-weight:600}
.act{display:flex;gap:4px;justify-content:center}
.abtn{width:26px;height:26px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.abtn:hover{background:var(--red-soft);border-color:var(--red-mid)}
.abtn.ok:hover{background:var(--green-soft);border-color:#B2E8BF}
.empty{text-align:center;padding:56px 20px;color:var(--text3)}
.empty-icon{font-size:32px;margin-bottom:10px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border-radius:var(--r-xl);padding:24px;width:520px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 24px 48px rgba(0,0,0,.18)}
.mhead{font-size:16px;font-weight:600;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.mdot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
.fg label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.fg input,.fg select,.fg textarea{border:1px solid var(--border);border-radius:var(--r-md);padding:9px 12px;font-family:var(--font);font-size:13px;color:var(--text1);background:var(--surface2);width:100%;outline:none;transition:border .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--red);background:var(--surface)}
.fg textarea{resize:vertical;min-height:70px}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.btn-cancel{background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:20px;padding:8px 18px;font-family:var(--font);font-size:13px;cursor:pointer}
.btn-save{background:var(--red);color:#fff;border:none;border-radius:20px;padding:8px 20px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(28,28,30,.92);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:500;z-index:999;white-space:nowrap}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:16px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ===== MOBILE (≤768px) ===== */
@media (max-width:768px){
  html,body{font-size:14px}
  .app{height:100vh;height:100dvh}

  /* Topbar */
  .topbar{padding:10px 14px;gap:10px}
  .brand-name{font-size:13px}
  .brand-tag{font-size:10px}
  .sync span{display:none}
  .btn-new{padding:7px 14px;font-size:12px;flex-shrink:0}

  /* Métricas: rolagem horizontal */
  .metrics{padding:10px 14px;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .metrics::-webkit-scrollbar{display:none}
  .metric{min-width:108px;flex:0 0 auto;padding:10px 12px}
  .mnum{font-size:19px}
  .mlabel{font-size:9px}

  /* Filtros: rolagem horizontal */
  .filters{padding:8px 14px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .ftag{display:none}
  .fsel,.btn-clr{flex:0 0 auto}

  /* Tabela vira cards */
  .table-area{padding:12px 12px 24px}
  .tcard table{table-layout:auto}
  .tcard colgroup,.tcard thead{display:none}
  .tcard tbody{display:block}
  .tcard tr{
    display:grid;
    grid-template-columns:auto 1fr auto;
    grid-template-areas:
      "idx   date    status"
      "loja  loja    loja"
      "lider lider   lider"
      "lidd  lidd    lidd"
      "comb  comb    comb"
      "resp  resp    resp"
      "prazo prazo   actions";
    gap:6px 10px;
    padding:14px;
    border-bottom:1px solid var(--border);
  }
  .tcard tr:last-child{border-bottom:none}
  .tcard tr:hover td{background:transparent}
  tr.r-late{background:#FFF8F8}
  tr.r-today{background:#FFFDF5}

  .tcard td{display:block;border:none;padding:0;overflow:visible;white-space:normal;text-overflow:clip;background:transparent!important}
  .tcard td:nth-child(1){grid-area:idx;color:var(--text3);font-size:11px;align-self:center;text-align:left!important}
  .tcard td:nth-child(1)::before{content:"#"}
  .tcard td:nth-child(2){grid-area:date;align-self:center;font-weight:500}
  .tcard td:nth-child(3){grid-area:loja}
  .tcard td:nth-child(4){grid-area:lider;font-size:12px;color:var(--text2)}
  .tcard td:nth-child(4)::before{content:"Líder: ";font-weight:600;color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.04em;margin-right:4px}
  .tcard td:nth-child(5){grid-area:lidd;font-size:12px}
  .tcard td:nth-child(5)::before{content:"Liderado: ";font-weight:600;color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.04em;margin-right:4px}
  .tcard td:nth-child(6){grid-area:comb;padding:8px 0;border-top:1px dashed var(--border);border-bottom:1px dashed var(--border);font-size:13px}
  .tcard td:nth-child(7){grid-area:resp;font-size:12px;color:var(--text2)}
  .tcard td:nth-child(7)::before{content:"Resp: ";font-weight:600;color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.04em;margin-right:4px}
  .tcard td:nth-child(8){grid-area:prazo;font-size:12px}
  .tcard td:nth-child(8)::before{content:"Prazo: ";font-weight:600;color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.04em;margin-right:4px}
  .tcard td:nth-child(9){grid-area:status;justify-self:end;align-self:center}
  .tcard td:nth-child(10){grid-area:actions;justify-self:end}
  .tcard td:nth-child(10) .act{justify-content:flex-end}

  /* Botões de ação maiores p/ toque */
  .abtn{width:34px;height:34px;font-size:14px}

  /* Modal: tela cheia confortável */
  .modal{width:calc(100vw - 12px);max-height:94vh;padding:18px;border-radius:16px}
  .mhead{font-size:15px;margin-bottom:16px;padding-bottom:12px}
  .mrow{grid-template-columns:1fr;gap:10px}
  /* Evita zoom automático do iOS Safari ao focar inputs (precisa ≥16px) */
  .fg input,.fg textarea{font-size:16px}
}

/* ===== MOBILE PEQUENO (≤380px) ===== */
@media (max-width:380px){
  .brand-tag{display:none}
  .btn-new{padding:6px 11px;font-size:11px}
  .metric{min-width:100px;padding:9px 11px}
  .mnum{font-size:17px}
}
</style>
</head>
<body>

<div class="loading-screen" id="ls">
  <div class="spinner"></div>
  <div style="font-size:13px;color:#AEAEB2">Conectando à nuvem...</div>
</div>

<div class="app" id="app" style="display:none">
  <div class="topbar">
    <div class="brand">
      <div class="brand-dot"></div>
      <div><div class="brand-name">Óticas Diniz</div><div class="brand-tag">Controle de Combinados 1:1</div></div>
    </div>
    <div class="topbar-right">
      <div class="sync"><div class="sdot" id="sdot"></div><span id="stxt">Sincronizado</span></div>
      <button class="btn-new" onclick="openModal()">+ Novo combinado</button>
    </div>
  </div>

  <div class="metrics" id="metrics"></div>

  <div class="filters">
    <span class="ftag">Filtrar por</span>
    <select class="fsel" id="filtLoja" onchange="renderTable()">
      <option value="">Todas as unidades</option>
      <optgroup label="Lojas">
        <option>Grande Circular Shopping</option>
        <option>Sumaúma Shopping</option>
        <option>Amazonas Shopping</option>
        <option>Manauara Shopping</option>
        <option>Manacapuru</option>
      </optgroup>
      <optgroup label="Setores"><option>Administrativo</option></optgroup>
    </select>
    <select class="fsel" id="filtStatus" onchange="renderTable()">
      <option value="">Todos os status</option>
      <option>Pendente</option><option>Atrasado</option><option>Vence hoje</option><option>Concluído</option>
    </select>
    <select class="fsel" id="filtLider" onchange="renderTable()">
      <option value="">Todos os líderes</option>
    </select>
    <button class="btn-clr" onclick="clearF()">Limpar filtros</button>
  </div>

  <div class="table-area">
    <div class="tcard">
      <table>
        <colgroup><col style="width:32px"><col style="width:88px"><col style="width:118px"><col style="width:94px"><col style="width:94px"><col><col style="width:94px"><col style="width:82px"><col style="width:96px"><col style="width:78px"></colgroup>
        <thead><tr>
          <th style="text-align:center">#</th><th>Reunião</th><th>Loja / Setor</th>
          <th>Líder</th><th>Liderado(a)</th><th>Combinado</th>
          <th>Responsável</th><th>Prazo</th><th>Status</th><th style="text-align:center">Ações</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none">
        <div class="empty-icon">📋</div>
        <p>Nenhum combinado ainda.</p>
        <p style="margin-top:4px">Clique em <strong>+ Novo combinado</strong> para começar.</p>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay" style="display:none" onclick="outsideClose(event)">
    <div class="modal">
      <div class="mhead"><div class="mdot"></div><span id="mTitle">Novo combinado</span></div>
      <div class="mrow">
        <div class="fg"><label>Data da reunião</label><input type="date" id="fData"></div>
        <div class="fg"><label>Loja / Setor</label>
          <select id="fLoja">
            <option value="">Selecione...</option>
            <optgroup label="Lojas">
              <option>Grande Circular Shopping</option><option>Sumaúma Shopping</option>
              <option>Amazonas Shopping</option><option>Manauara Shopping</option><option>Manacapuru</option>
            </optgroup>
            <optgroup label="Setores"><option>Administrativo</option></optgroup>
          </select>
        </div>
        <div class="fg"><label>Líder</label><input type="text" id="fLider" placeholder="Nome do líder"></div>
        <div class="fg"><label>Liderado(a)</label><input type="text" id="fLiderado" placeholder="Nome do colaborador"></div>
        <div class="fg full"><label>Combinados / Ações</label><textarea id="fComb" placeholder="• Pressione Enter para adicionar outro tópico..."></textarea></div>
        <div class="fg"><label>Responsável</label><input type="text" id="fResp" placeholder="Quem executa"></div>
        <div class="fg"><label>Data-limite</label><input type="date" id="fPrazo"></div>
        <div class="fg full"><label>Observação (opcional)</label><input type="text" id="fObs" placeholder="Contexto adicional"></div>
      </div>
      <div class="mfoot">
        <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn-save" id="btnSave" onclick="saveItem()">Salvar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" style="display:none"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC71cdhIPQMcXMoX6iyvtQqdAZMhcXL3r0",
  authDomain: "controle-one-o-one-diniz.firebaseapp.com",
  projectId: "controle-one-o-one-diniz",
  storageBucket: "controle-one-o-one-diniz.firebasestorage.app",
  messagingSenderId: "296519476846",
  appId: "1:296519476846:web:6b564ebb854cfed711287f"
};

const db = getFirestore(initializeApp(firebaseConfig));
const COL = "combinados";
let items = [], editId = null;

const td = () => new Date().toISOString().slice(0,10);
function fmt(d){if(!d)return'—';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`;}
function fmtComb(text){
  if(!text)return'<div style="line-height:1.45">—</div>';
  const lines=text.split('\n').map(l=>l.replace(/^[•\-\*]\s*/,'').trim()).filter(l=>l);
  if(lines.length===0)return'<div style="line-height:1.45">—</div>';
  if(lines.length===1)return`<div style="line-height:1.45">${lines[0]}</div>`;
  return`<ul style="margin:0;padding-left:16px;line-height:1.5">${lines.map(l=>`<li>${l}</li>`).join('')}</ul>`;
}
function getStatus(i){if(i.status==='Concluído')return'Concluído';if(!i.prazo)return'Pendente';const t=td();if(i.prazo<t)return'Atrasado';if(i.prazo===t)return'Vence hoje';return'Pendente';}

function setSync(s){
  const dot=document.getElementById('sdot'),txt=document.getElementById('stxt');
  if(s==='ok'){dot.className='sdot';txt.textContent='Sincronizado';}
  else if(s==='load'){dot.className='sdot spin';txt.textContent='Salvando...';}
  else{dot.className='sdot err';txt.textContent='Erro de conexão';}
}

function render(){
  let tot=items.length,lat=0,hj=0,pen=0,con=0;
  items.forEach(i=>{const s=getStatus(i);if(s==='Atrasado')lat++;else if(s==='Vence hoje')hj++;else if(s==='Pendente')pen++;else con++;});
  document.getElementById('metrics').innerHTML=[
    {c:'total',ic:'📊',n:tot,l:'Total'},
    {c:'atrasado',ic:'⚠',n:lat,l:'Atrasado'},
    {c:'hoje',ic:'⏰',n:hj,l:'Vence hoje'},
    {c:'pendente',ic:'🕐',n:pen,l:'Pendente'},
    {c:'concluido',ic:'✓',n:con,l:'Concluído'}
  ].map(d=>`<div class="metric ${d.c}"><div class="micon">${d.ic}</div><div class="mnum">${d.n}</div><div class="mlabel">${d.l}</div></div>`).join('');

  const s=document.getElementById('filtLider'),cur=s.value;
  const l=[...new Set(items.map(i=>i.lider).filter(Boolean))].sort();
  s.innerHTML='<option value="">Todos os líderes</option>'+l.map(x=>`<option${x===cur?' selected':''}>${x}</option>`).join('');
  renderTable();
}

function renderTable(){
  const lj=document.getElementById('filtLoja').value,
        st=document.getElementById('filtStatus').value,
        ld=document.getElementById('filtLider').value;
  const f=items.filter(i=>{
    const s=getStatus(i);
    if(lj&&i.loja!==lj)return false;
    if(ld&&i.lider!==ld)return false;
    if(st&&s!==st)return false;
    return true;
  }).sort((a,b)=>{
    const o={'Atrasado':0,'Vence hoje':1,'Pendente':2,'Concluído':3},sa=getStatus(a),sb=getStatus(b);
    if(o[sa]!==o[sb])return o[sa]-o[sb];
    if(a.prazo&&b.prazo)return a.prazo.localeCompare(b.prazo);
    return 0;
  });
  const tb=document.getElementById('tbody'),em=document.getElementById('empty');
  if(!f.length){tb.innerHTML='';em.style.display='block';return;}
  em.style.display='none';
  tb.innerHTML=f.map((it,idx)=>{
    const s=getStatus(it),
      rc=s==='Atrasado'?'r-late':s==='Vence hoje'?'r-today':s==='Concluído'?'r-done':'',
      bc=s==='Atrasado'?'p-late':s==='Vence hoje'?'p-today':s==='Pendente'?'p-pend':'p-done',
      bi=s==='Atrasado'?'⚠':s==='Vence hoje'?'⏰':s==='Pendente'?'🕐':'✓',
      dc=s==='Atrasado'?'dlate':s==='Vence hoje'?'dtoday':'',
      pc=it.loja==='Administrativo'?'ltag admin':'ltag';
    return`<tr class="${rc}">
      <td style="text-align:center;color:var(--text3);font-size:10px">${idx+1}</td>
      <td><span class="dmono">${fmt(it.dataReuniao)}</span></td>
      <td><span class="${pc}">${it.loja||'—'}</span></td>
      <td>${it.lider||'—'}</td><td>${it.liderado||'—'}</td>
      <td>${fmtComb(it.combinado)}${it.obs?`<div style="font-size:10px;color:var(--text3);margin-top:2px">${it.obs}</div>`:''}</td>
      <td style="color:var(--text2)">${it.responsavel||'—'}</td>
      <td><span class="dmono ${dc}">${fmt(it.prazo)}</span></td>
      <td><span class="pill ${bc}">${bi} ${s}</span></td>
      <td><div class="act">
        ${s!=='Concluído'?`<button class="abtn ok" onclick="_done('${it.id}')">✓</button>`:''}
        <button class="abtn" onclick="_edit('${it.id}')">✏</button>
        <button class="abtn" onclick="_del('${it.id}')">🗑</button>
      </div></td></tr>`;
  }).join('');
}

// Listener em tempo real
onSnapshot(query(collection(db,COL)),(snap)=>{
  items=snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
  document.getElementById('ls').style.display='none';
  document.getElementById('app').style.display='flex';
  setSync('ok');
},(e)=>{ console.error(e); setSync('error'); });

window.openModal=function(id=null){
  editId=id;const it=id?items.find(i=>i.id===id):null;
  document.getElementById('mTitle').textContent=id?'Editar combinado':'Novo combinado';
  document.getElementById('fData').value=it?.dataReuniao||td();
  document.getElementById('fLoja').value=it?.loja||'';
  document.getElementById('fLider').value=it?.lider||'';
  document.getElementById('fLiderado').value=it?.liderado||'';
  document.getElementById('fComb').value=it?.combinado||'';
  document.getElementById('fResp').value=it?.responsavel||'';
  document.getElementById('fPrazo').value=it?.prazo||'';
  document.getElementById('fObs').value=it?.obs||'';
  document.getElementById('overlay').style.display='flex';
};
window.closeModal=function(){document.getElementById('overlay').style.display='none';editId=null;};
window.outsideClose=function(e){if(e.target.id==='overlay')closeModal();};

window.saveItem=async function(){
  const rawComb=document.getElementById('fComb').value;
  const comb=rawComb.split('\n').map(l=>l.trimEnd()).filter(l=>l.replace(/^[•\-\*]\s*/,'').trim()!=='').join('\n').trim();
  const loja=document.getElementById('fLoja').value;
  if(!comb){toast('Preencha o campo Combinado.');return;}
  if(!loja){toast('Selecione a loja.');return;}
  document.getElementById('btnSave').disabled=true;setSync('load');
  const data={
    dataReuniao:document.getElementById('fData').value,loja,
    lider:document.getElementById('fLider').value.trim(),
    liderado:document.getElementById('fLiderado').value.trim(),
    combinado:comb,responsavel:document.getElementById('fResp').value.trim(),
    prazo:document.getElementById('fPrazo').value,
    obs:document.getElementById('fObs').value.trim(),
    status:editId?(items.find(i=>i.id===editId)?.status||'Pendente'):'Pendente',
    criadoEm:editId?(items.find(i=>i.id===editId)?.criadoEm||new Date().toISOString()):new Date().toISOString()
  };
  try{
    if(editId){await updateDoc(doc(db,COL,editId),data);toast('Atualizado!');}
    else{await addDoc(collection(db,COL),data);toast('Combinado salvo!');}
    closeModal();
  }catch(e){toast('Erro ao salvar. Verifique a conexão.');setSync('error');}
  document.getElementById('btnSave').disabled=false;
};

window._edit=function(id){openModal(id);};
window._del=async function(id){
  if(!confirm('Excluir este combinado?'))return;
  setSync('load');
  try{await deleteDoc(doc(db,COL,id));toast('Removido.');}
  catch(e){toast('Erro ao excluir.');setSync('error');}
};
window._done=async function(id){
  setSync('load');
  try{await updateDoc(doc(db,COL,id),{status:'Concluído'});toast('Concluído ✓');}
  catch(e){toast('Erro ao atualizar.');setSync('error');}
};
window.renderTable=renderTable;
window.clearF=function(){
  document.getElementById('filtLoja').value='';
  document.getElementById('filtStatus').value='';
  document.getElementById('filtLider').value='';
  renderTable();
};

let tt;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(tt);tt=setTimeout(()=>t.style.display='none',2500);}

const fCombEl=document.getElementById('fComb');
fCombEl.addEventListener('focus',()=>{
  if(!fCombEl.value){fCombEl.value='• ';setTimeout(()=>fCombEl.setSelectionRange(2,2),0);}
});
fCombEl.addEventListener('keydown',(e)=>{
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    const s=fCombEl.selectionStart,en=fCombEl.selectionEnd;
    const v=fCombEl.value;
    fCombEl.value=v.substring(0,s)+'\n• '+v.substring(en);
    const np=s+3;fCombEl.setSelectionRange(np,np);
  }
});
</script>
